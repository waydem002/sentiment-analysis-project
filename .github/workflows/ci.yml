name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "data/**"
      - "requirements.txt"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "data/**"
      - "requirements.txt"
      - ".github/workflows/**"

jobs:
  run-formatter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
          pip install nltk
          echo "Installed packages:"
          pip list
          echo "Check nltk:"
          python -c "import nltk; print('NLTK imported OK, version:', nltk.__version__)"


      - name: Download NLTK data
        run: |
         python -c "import nltk; nltk.download('stopwords', quiet=True); nltk.download('wordnet', quiet=True)"
    

      - name: Run the formatter script
        run: |
          python src/formatter.py --input data/sentiments.csv --output data/cleaned_sentiments.csv

      - name: Run predict script on sample text
        run: |
          python src/predict.py --model models/sentiment.joblib --text "I love this product!"    
